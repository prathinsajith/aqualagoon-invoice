# Single-project repo (not a real monorepo). The `packages` field is required
# by pnpm — without it, newer pnpm versions abort install with "packages field
# missing or empty" (e.g. on Railway/Vercel CI). `.` matches the lockfile's
# existing single importer, so --frozen-lockfile stays valid.
packages:
  - .

allowBuilds:
  sharp: true
  unrs-resolver: true

# Supply-chain hardening: only install releases that have been public for 7 days
# (lets malicious versions get caught/unpublished first), and never accept a
# package whose trust signals (provenance/signatures) weaken between updates.
minimumReleaseAge: 10080
trustPolicy: no-downgrade
